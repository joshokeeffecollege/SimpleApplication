version: 2.1

jobs:
  build_and_test:
    docker:
      - image: cimg/node:20.11
    working_directory: ~/project
    steps:
      - checkout

      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
            - v1-dependencies-

      - run:
          name: Install dependencies
          command: npm install

      - run:
          name: Run tests
          command: npm test

      - save_cache:
          key: v1-dependencies-{{ checksum "package-lock.json" }}
          paths:
            - node_modules

workflows:
  version: 2
  build_test_workflow:
    jobs:
      - build_and_test:
          filters:
            branches:
              only:
                - main
